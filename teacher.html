<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Teacher Dashboard | AI Classroom</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #f8f9fa; color: #222; }
    nav { background: teal; padding: 15px; color: white; font-size: 18px; }
    nav a { color: white; margin-left: 15px; text-decoration: none; }
    .dashboard { display: flex; min-height: 100vh; }
    .sidebar { width: 220px; background: #fff; padding: 20px; border-right: 1px solid #ddd; }
    .sidebar h2 { font-size: 18px; margin-bottom: 10px; }
    .sidebar ul { list-style: none; padding: 0; }
    .sidebar li { padding: 10px; margin-bottom: 8px; border-radius: 6px; cursor: pointer; transition: 0.2s; }
    .sidebar li:hover { background: #e6f7f7; }
    .main { flex: 1; padding: 20px; }
    .card { background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
    .student-list { list-style: none; padding: 0; }
    .student-list li { margin: 8px 0; font-size: 15px; }
    .student-list a { color: #00796b; text-decoration: none; font-weight: bold; }
    .student-list a:hover { text-decoration: underline; }
    .status { display: inline-block; width: 12px; height: 12px; border-radius: 50%; margin-right: 8px; }
    .green { background: green; } .yellow { background: orange; } .red { background: red; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav>
    Teacher Dashboard
    <a href="reportpage.html">Report</a>
   
  </nav>

  <!-- Dashboard Layout -->
  <div class="dashboard">
    <!-- Sidebar -->
    <aside class="sidebar">
      <h2>Subjects</h2>
      <ul>
        <li>📐 Math</li>
        <li>🔬 Science</li>
        <li>📖 English</li>
        <li>🌍 History</li>
      </ul>
    </aside>

    <!-- Main -->
    <main class="main">
      <div class="grid">
        <!-- Live Engagement -->
        <div class="card">
          <h3>📊 Live Engagement</h3>
          <p>Engaged: 72% ✅</p>
          <p>Confused: 18% ⚠️</p>
          <p>Distracted: 10% ❌</p>
        </div>

        <!-- Student List -->
        <div class="card">
          <h3>👩‍🎓 Student Status</h3>
          <ul class="student-list">
            <li><span class="status green"></span><a href="neha.html">neha</a></li>
            <li><span class="status yellow"></span>sarthak</li>
            <li><span class="status red"></span>sanskriti</li>
            <li><span class="status green"></span>vashu</li>
          </ul>
        </div>
      </div>

      <!-- Class Summary Chart -->
      <div class="card">
        <h3>📈 Class Summary</h3>
        <canvas id="classChart"></canvas>
      </div>
    </main>
  </div>

  <!-- Chart.js -->
  <script>
    const ctx = document.getElementById('classChart');
    new Chart(ctx, {
      type: 'bar',
      data: {
        labels: ['Engaged', 'Confused', 'Distracted'],
        datasets: [{
          data: [72, 18, 10],
          backgroundColor: ['green', 'orange', 'red']
        }]
      },
      options: {
        responsive: true,
        plugins: { legend: { display: false } },
        scales: { y: { min: 0, max: 100 } }
      }
    });
  </script>

</body>
</html>
